# Tiny Tapeout project information (Wokwi project)
project:
  wokwi_id:     462005178779841537       # Set this to the ID of your Wokwi project (the number from the project's URL)
  title:        "TT-Wokwi-Test"      # Project title
  author:       "Joël de Kanter"      # Your name
  discord:      "joelbasel"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Test if Wokwi & GitHub works"      # One line description of what your project does
  language:     "Wokwi" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2


# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "RX"
  ui[1]: "clk_i"
  ui[2]: "Reset"
  ui[3]: "set_manual"
  ui[4]: "reset_manual_/_autoset"
  ui[5]: "clk_intern"
  ui[6]: "clk_extern"
  ui[7]: "parity_even"

  # Outputs
  uo[0]: "D0"
  uo[1]: "D1"
  uo[2]: "D2"
  uo[3]: "D3"
  uo[4]: "D4"
  uo[5]: "D5"
  uo[6]: "D6"
  uo[7]: "D7"

  # Bidirectional pins
  uio[0]: "partity_odd"
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: "bit_start"
  uio[5]: "bit_parity"
  uio[6]: "parity_match"
  uio[7]: ""

# Do not change!
yaml_version: 6
